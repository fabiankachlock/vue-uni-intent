name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # Required for npm trusted publishing and provenance (OIDC).
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

      # Auth via npm trusted publishing (OIDC) — no token needed, and
      # provenance is generated automatically for OIDC publishes.
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
